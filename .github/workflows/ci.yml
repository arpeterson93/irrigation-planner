name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest

      - name: Run golden math tests
        run: pytest tests/ -v

      - name: Check for em dashes in shipped app copy
        # Scoped to docs/js and docs/css only. legacy/sprinkler-simulator.html is kept
        # verbatim on purpose (PLAN.md section 2) and still contains its original em
        # dashes, and docs/index.html is a verbatim copy of it until Phase 1 replaces
        # it with a markup-only shell (PLAN.md task 10). Widen this to include
        # docs/index.html once that Phase 1 swap has happened.
        run: |
          if grep -rP '\x{2014}' docs/js/ docs/css/ 2>/dev/null; then
            echo "Em dash found in the files above. Remove it (see PLAN.md general requirements)."
            exit 1
          fi
          echo "No em dashes found (docs/js, docs/css)."
