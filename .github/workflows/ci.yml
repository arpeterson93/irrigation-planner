name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run golden math + migration tests
        run: pytest tests/ -v

      - name: Check for em dashes in shipped app copy
        # Phase 1 replaced docs/index.html with a markup-only shell and split the
        # app into docs/js + docs/css, so the whole docs/ tree is now swept (task
        # 10). legacy/sprinkler-simulator.html is intentionally excluded: it is kept
        # verbatim for reference (PLAN.md section 2) and still has its original em
        # dashes. En dashes (U+2013) and subscripts are allowed; only em dashes
        # (U+2014) are banned.
        run: |
          if grep -rP '\x{2014}' docs/ 2>/dev/null; then
            echo "Em dash found in the files above. Remove it (see PLAN.md task 10)."
            exit 1
          fi
          echo "No em dashes found in docs/."
